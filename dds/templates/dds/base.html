<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ДДС{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dds:transaction_list' %}">
            <i class="bi bi-wallet2"></i> ДДС
        </a>

        <div class="navbar-nav ms-auto gap-2">

            <a class="btn btn-primary text-white"
               href="{% url 'dds:transaction_list' %}">
                <i class="bi bi-table"></i> Транзакции
            </a>

            <a class="btn btn-primary text-white"
               href="{% url 'dds:references' %}">
                <i class="bi bi-journal-text"></i> Справочники
            </a>

            <a class="btn btn-light"
               href="{% url 'dds:transaction_create' %}">
                <i class="bi bi-plus-circle"></i> Добавить
            </a>

        </div>
    </div>
</nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
